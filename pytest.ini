[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output options
addopts =
    --strict-markers
    --tb=short
    --verbose
    --color=yes
    --cov=doc2md
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=30
    --timeout=60
    -p no:warnings

# Test markers
markers =
    unit: Unit tests — fast, isolated, no external dependencies
    integration: Integration tests — test interactions between components
    slow: Slow tests (deselect with '-m "not slow"')
    network: Tests requiring network access (Ollama, APIs)
    ollama: Tests requiring a running Ollama instance

# Coverage settings
[coverage:run]
source = doc2md
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

# Timeout
timeout = 60
timeout_method = thread

# Logging during tests
log_cli = false
log_cli_level = WARNING
