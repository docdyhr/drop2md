name: Release — macOS Binary

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build, sign, notarize (arm64)
    runs-on: macos-14          # Apple Silicon, macOS 14 Sonoma
    timeout-minutes: 45

    env:
      HOMEBREW_PREFIX: /opt/homebrew
      PYTHON_VERSION: "3.11"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # libmagic is bundled into the binary; tesseract is a runtime dep (not bundled)
      - name: Install system dependencies
        run: |
          brew update --quiet
          brew install libmagic tesseract create-dmg

      - name: Install Python dependencies (no ML/torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pdf-light,office,ocr]"
          pip install "pyinstaller==6.11.1"

      - name: Build with PyInstaller
        run: pyinstaller drop2md.spec --clean --noconfirm

      - name: Smoke-test binary
        run: |
          ./dist/drop2md/drop2md --version
          ./dist/drop2md/drop2md --help > /dev/null

      # ── Code signing ──────────────────────────────────────────────────────
      # Required secrets:
      #   APPLE_DEVELOPER_CERT_P12   — base64-encoded .p12 export of your
      #                                "Developer ID Application" certificate
      #   APPLE_DEVELOPER_CERT_PASS  — passphrase used when exporting the .p12
      #   CODESIGN_IDENTITY          — full identity string, e.g.:
      #                                "Developer ID Application: Thomas Juul Dyhr (XXXXXXXXXX)"
      - name: Import code-signing certificate
        env:
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_DEVELOPER_CERT_PASS: ${{ secrets.APPLE_DEVELOPER_CERT_PASS }}
        run: |
          KEYCHAIN_PASS=$(openssl rand -hex 20)
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_DEVELOPER_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_CERT_PASS" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" \
            "$KEYCHAIN_PATH"

      - name: Code-sign bundle
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          # Sign dylibs and .so files first (inside-out order required by codesign)
          find dist/drop2md -name "*.so" -o -name "*.dylib" | while read -r f; do
            codesign --force --verify --timestamp \
              --options runtime \
              --entitlements scripts/entitlements.plist \
              --sign "$CODESIGN_IDENTITY" "$f"
          done
          # Sign the main executable last
          codesign --force --verify --timestamp \
            --options runtime \
            --entitlements scripts/entitlements.plist \
            --sign "$CODESIGN_IDENTITY" \
            dist/drop2md/drop2md
          codesign --verify --deep --strict --verbose=2 dist/drop2md/drop2md

      # ── Package into .dmg ─────────────────────────────────────────────────
      - name: Create .dmg
        run: |
          STAGING=$(mktemp -d)
          cp -R dist/drop2md "$STAGING/drop2md"

          cat > "$STAGING/install.sh" << 'INSTALL_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DEST="${1:-/usr/local/bin}"
          mkdir -p "$DEST"
          cp "$(dirname "$0")/drop2md/drop2md" "$DEST/drop2md"
          chmod +x "$DEST/drop2md"
          echo "drop2md installed to $DEST/drop2md"
          echo "Run: drop2md setup"
          INSTALL_EOF
          chmod +x "$STAGING/install.sh"

          create-dmg \
            --volname "drop2md ${{ env.VERSION }}" \
            --window-pos 200 120 \
            --window-size 560 320 \
            --icon-size 96 \
            --no-internet-enable \
            "drop2md-${{ env.VERSION }}-arm64.dmg" \
            "$STAGING"

      - name: Sign .dmg
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          codesign --force --verify --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            "drop2md-${{ env.VERSION }}-arm64.dmg"

      # ── Notarize ──────────────────────────────────────────────────────────
      # Required secrets:
      #   APPLE_ID                — your Apple ID email (e.g. docdyhr@me.com)
      #   APPLE_NOTARIZE_PASSWORD — app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID           — 10-char Team ID from developer.apple.com
      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_OUT=$(xcrun notarytool submit \
            "drop2md-${{ env.VERSION }}-arm64.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_NOTARIZE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600 2>&1)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          # Always fetch and save the Apple log (contains rejection details)
          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Apple notarization log (id: $SUBMISSION_ID) ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_NOTARIZE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1 | tee notarization-log.json
            echo "=== End of Apple log ==="
          fi
          # Fail if status was not Accepted
          echo "$SUBMIT_OUT" | grep -q "status: Accepted" || { echo "Notarization was not accepted"; exit 1; }
          xcrun stapler staple "drop2md-${{ env.VERSION }}-arm64.dmg"
          xcrun stapler validate "drop2md-${{ env.VERSION }}-arm64.dmg"

      - name: Upload notarization log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: notarization-log
          path: notarization-log.json
          if-no-files-found: ignore

      # ── SHA-256 for Homebrew formula ──────────────────────────────────────
      - name: Compute SHA-256
        run: |
          SHA256=$(shasum -a 256 "drop2md-${{ env.VERSION }}-arm64.dmg" | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "drop2md-${{ env.VERSION }}-arm64.dmg"
          generate_release_notes: true
          body: |
            ## Installation

            **Homebrew (recommended):**
            ```bash
            brew tap docdyhr/tap
            brew install drop2md
            ```

            **Direct download:**
            1. Download `drop2md-${{ env.VERSION }}-arm64.dmg`
            2. Open the .dmg and run `./install.sh`  (or copy `drop2md/drop2md` to `/usr/local/bin/`)

            **After install:**
            ```bash
            drop2md setup        # interactive configuration wizard
            drop2md install-service   # install background watcher
            ```

            **Platform:** Apple Silicon (arm64, macOS 14+)
            **SHA-256:** `${{ env.SHA256 }}`

            > For Intel Macs or Linux: `pip install 'drop2md[pdf-light,office,ocr]'`

      - name: Post SHA-256 to job summary
        run: |
          {
            echo "## Release Asset SHA-256"
            echo ""
            echo "Update \`Formula/drop2md.rb\` in \`docdyhr/homebrew-tap\` with:"
            echo '```ruby'
            echo "sha256 arm64_sonoma: \"${{ env.SHA256 }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
